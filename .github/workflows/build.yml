name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] # Triggers on tags like v1.1, v1.2, etc.
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    # Step to upload the JAR as an artifact (available in the Actions tab)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FirstJoinRTP-Build
        path: target/*.jar

    # Step to create a GitHub Release only when a TAG is pushed (e.g., git tag v1.1 && git push origin v1.1)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: target/*.jar
        body_path: README.md # You can change this to a changelog later
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
